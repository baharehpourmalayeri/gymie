<div class="min-h-screen flex items-center justify-center">
  <div class="max-w-md w-[80%] md:w-full p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    @if (errorMessage) {
      <p class="text-red-600 text-center mb-4">{{ errorMessage }}</p>
    }

    <form (ngSubmit)="login()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full text-base border rounded-full px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full text-base border rounded-full px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
        />
      </div>

      <button
        type="submit"
        [disabled]="!email || !password"
        class="w-full text-base bg-green-800 text-white py-2 rounded-full hover:bg-green-700 transition cursor-pointer disabled:bg-[#bbbbbb] disabled:cursor-not-allowed"
      >
        Login
      </button>
    </form>

    <p class="mt-4 text-center text-sm">
      Don’t have an account?
      <a routerLink="/register" class="text-green-800 hover:underline cursor-pointer">Register</a>
    </p>
  </div>
</div>
