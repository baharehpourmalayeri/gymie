<div class="min-h-screen">
  <section class="relative h-[75vh] lg:h-screen overflow-hidden">
    <img
      src="/assets/home/1.jpg"
      alt="Landing Image"
      class="absolute w-full h-full object-cover"
      [style.transform]="'translateY(' + scrollY * 0.3 + 'px)'"
    />

    <div
      class="absolute inset-0 flex flex-col justify-center items-center text-center bg-black/40 text-white px-4 sm:px-6 lg:px-6"
      [style.transform]="'translateY(' + scrollY * 0.6 + 'px)'"
    >
      <h1 class="text-4xl font-bold mb-4">
        <span class="font-orbitron">Moveo</span>
      </h1>
      <p class="mb-6 max-w-md font-orbitron">Where Every Move Matters</p>
    </div>
  </section>

  <div>
    <app-popular-workouts [workouts]="topWorkouts"></app-popular-workouts>
    <app-about></app-about>
  </div>
</div>
