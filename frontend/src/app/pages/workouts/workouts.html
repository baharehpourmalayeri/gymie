<div class="page-content">
  <div class="flex justify-between items-center">
    <h1 class="font-orbitron text-xl md:text-2xl font-bold mb-4">Our Workouts</h1>
    <div class="relative w-1/2 md:w-1/3 mb-6">
      <input
        type="text"
        placeholder="Search workouts..."
        [(ngModel)]="searchTerm"
        class="w-full text-base p-2 pl-10 border border-gray-300 rounded-full shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-gray-300 transition"
      />
      <mat-icon
        class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"
      >
        search
      </mat-icon>
    </div>
  </div>

  <app-workout-list [workouts]="workouts"></app-workout-list>
</div>
