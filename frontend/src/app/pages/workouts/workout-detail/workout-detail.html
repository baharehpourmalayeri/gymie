@if (workout; as selectedWorkout) {
  <div class="flex justify-center mt-10 px-4 py-28">
    <div class="w-full max-w-4xl p-6 universal-card rounded-lg shadow">
      <img
        [src]="selectedWorkout.image"
        [alt]="selectedWorkout.title"
        class="w-full h-64 object-cover rounded-lg mb-4"
      />
      <div class="flex justify-between items-start mb-4">
        <div class="flex-col">
          <h1 class="text-3xl font-bold mb-4">{{ selectedWorkout.title }}</h1>
          <p class="mb-4 mt-6">{{ selectedWorkout?.longDescription }}</p>
        </div>
        <div class="flex flex-col justify-between items-end">
          <app-favorite-toggle
            [id]="workout.title"
            (favoriteChange)="onFavoriteChange($event)"
          ></app-favorite-toggle>
        </div>
      </div>
      <div class="flex justify-end mt-4">
        <button class="universal-button px-4 py-2 rounded-full">Book Now</button>
      </div>
    </div>
  </div>
}
