<div class="page-content w-100">
  <div class="flex flex-col items-center mb-6">
    <div class="avatar">
      <mat-icon class="text-black!">account_circle</mat-icon>
    </div>
  </div>
  <form [formGroup]="profileForm" class="space-y-2 mb-18">
    <div>
      <label class="block text-sm font-medium mb-1">Full Name</label>
      <input
        type="text"
        formControlName="name"
        class="universal-card w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring"
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input
        type="email"
        formControlName="email"
        class="universal-card w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring"
      />
    </div>

    <div class="border-t pt-4 mt-4">
      <h3 class="text-sm font-semibold mb-2">Change Password</h3>

      <input
        type="password"
        placeholder="CurrentPassword"
        formControlName="currentPassword"
        class="universal-card w-full px-3 py-2 border rounded-lg mb-2"
      />

      <input
        type="password"
        placeholder="New Password"
        formControlName="newPassword"
        class="universal-card w-full px-3 py-2 border rounded-lg mb-2"
      />

      <input
        type="password"
        placeholder="Confirm New Password"
        formControlName="confirmNewPassword"
        class="universal-card w-full px-3 py-2 border rounded-lg"
      />
    </div>

    <button
      type="submit"
      class="universal-button py-2 px-4 rounded-lg mt-4 cursor-pointer"
      (click)="handleChangePassword()"
    >
      Save Changes
    </button>
  </form>
</div>
