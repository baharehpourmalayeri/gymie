<div class="page-content md:w-200 mb-10">
  <h2 class="font-orbitron text-xl md:text-2xl font-bold mb-6 ml-10 md:ml-0">My Favorites</h2>

  <div class="place-items-center mx-auto grid gap-6 grid-cols-1 md:grid-cols-3">
    @for (workout of workouts; track workout.id) {
      <div class="w-[80%] md:w-full relative rounded-xl overflow-hidden shadow-lg flex flex-col">
        <img
          [src]="workout.image"
          alt="{{ workout.title }}"
          class="w-full h-48 object-cover transition-transform duration-300 group-hover:scale-105"
        />

        <div class="universal-card p-4 flex flex-col justify-between flex-1">
          <h3 class="font-orbitron text-lg font-bold">{{ workout.title }}</h3>
          <p class="text-sm mt-1 line-clamp-2">{{ workout.description }}</p>
        </div>

        <div class="absolute top-2 right-2 z-10">
          <app-favorite-toggle [workout]="workout"></app-favorite-toggle>
        </div>
      </div>
    }
  </div>
</div>
