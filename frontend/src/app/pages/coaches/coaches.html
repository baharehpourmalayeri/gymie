<section class="page-content">
  <h1 class="text-4xl md:text-3xl font-extrabold mb-14">Meet Our Top Coaches</h1>

  <div class="max-w-6xl pb-20 grid gap-12 md:grid-cols-3 lg:grid-cols-3">
    @for (coach of coaches; track coach.name) {
      <div class="rounded-xl shadow-lg universal-card flex flex-col">
        <img
          [src]="coach.image"
          [alt]="coach.name"
          class="w-full h-64 rounded-t-xl object-cover transition-transform duration-500 group-hover:scale-105"
        />

        <div class="p-6 flex flex-col flex-1 justify-center">
          <h2 class="text-xl font-bold mb-1">{{ coach.name }}</h2>
          <p class="italic mb-4">{{ coach.title }}</p>
          <p class="text-sm mb-2">{{ coach.bio }}</p>
        </div>
        <button
          class="universal-button self-center w-40 mb-8 px-2 py-3 rounded-full transition mt-auto shadow-lg cursor-pointer"
          (click)="goToCoach(coach)"
        >
          Book Now
        </button>
      </div>
    }
  </div>
</section>
