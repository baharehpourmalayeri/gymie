<nav
  class="fixed top-0 w-full h-20 p-4 z-50 flex justify-between items-center transition-colors duration-300 universal-theme"
>
  <div class="flex items-center gap-4">
    <div class="relative w-20 md:w-25 flex items-center cursor-pointer">
      <img
        [src]="darkMode ? '/assets/nav/logo-light.png' : '/assets/nav/logo-dark.png'"
        alt="Moveo Logo"
        class="absolute w-auto object-contain"
        routerLink="/"
      />
    </div>

    <div class="hidden md:block">
      <app-nav-links [links]="links"></app-nav-links>
    </div>
  </div>

  <div class="hidden md:flex items-center space-x-4 relative">
    <div class="hidden md:block">
      <app-profile-menu
        [dropdownItems]="userAccountLinks"
        [darkMode]="darkMode"
        [user]="user$ | async"
        (logout)="logout()"
      ></app-profile-menu>
    </div>
    <div class="hidden md:block">
      <app-toggle-dark-mode
        [darkMode]="darkMode"
        (darkModeChange)="onToggleDarkMode($event)"
      ></app-toggle-dark-mode>
    </div>
  </div>

  <button
    class="md:hidden flex items-center justify-center w-10 h-10 mb-2"
    (click)="toggleMobileMenu()"
  >
    <mat-icon class="icon-md leading-none">
      {{ mobileMenuOpen ? 'close' : 'menu' }}
    </mat-icon>
  </button>

  @if (mobileMenuOpen) {
    <div
      class="fixed right-0 top-20 w-[50vw] max-w-sm h-[calc(100vh-5rem)] overflow-y-auto p-4 md:hidden z-50"
      [ngClass]="darkMode ? 'bg-[#2d2d2d]' : 'bg-gray-100 '"
    >
      <div class="flex flex-col space-y-3">
        @if (user$ | async; as user) {
          <div class="flex flex-row items-center justify-between">
            <app-toggle-dark-mode
              [darkMode]="darkMode"
              (darkModeChange)="onToggleDarkMode($event)"
            ></app-toggle-dark-mode>

            <app-profile-menu
              [darkMode]="darkMode"
              [user]="user"
              (logout)="logout()"
            ></app-profile-menu>
          </div>
        } @else {
          <div class="flex flex-row items-center justify-between">
            <app-toggle-dark-mode
              [darkMode]="darkMode"
              (darkModeChange)="onToggleDarkMode($event)"
            ></app-toggle-dark-mode>

            <app-profile-menu
              [darkMode]="darkMode"
              [user]="null"
              (click)="toggleMobileMenu()"
            ></app-profile-menu>
          </div>
        }

        <div
          class="h-px w-full bg-linear-to-r from-transparent via-gray-400/40 to-transparent shadow-sm"
        ></div>

        <div class="flex justify-center">
          <app-nav-links [links]="links" (click)="toggleMobileMenu()"></app-nav-links>
        </div>

        @if (user$ | async) {
          <div class="flex flex-col justify-center items-center space-y-4">
            @for (item of userAccountLinks; track item.label) {
              <a
                (click)="onItemClick(item)"
                class="flex items-center justify-center text-sm px-4 py-2 w-28 h-10 rounded-full duration-200 cursor-pointer"
              >
                {{ item.label }}
              </a>
            }
          </div>
        }
      </div>
    </div>
  }
</nav>
