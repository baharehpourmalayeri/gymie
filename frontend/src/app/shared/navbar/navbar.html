<nav
  class="fixed top-0 w-full p-4 z-50 flex justify-between items-center shadow-md transition-colors duration-300 universal-theme"
>
  <div class="flex items-center space-x-4">
    <div class="relative w-40 flex items-center overflow-visible cursor-pointer" style="height: 0">
      <img
        [src]="darkMode ? '/nav/logo-light.png' : '/nav/logo-dark.png'"
        alt="Moveo Logo"
        class="absolute -top-18 h-36 w-auto object-contain"
      />
    </div>

    <app-nav-links [links]="links" [darkMode]="darkMode"></app-nav-links>
  </div>

  <div class="flex items-center space-x-4">
    <app-profile-menu
      [dropdownItems]="dropdownItems"
      [darkMode]="darkMode"
      (logout)="logout()"
    ></app-profile-menu>

    <app-toggle-dark-mode
      [darkMode]="darkMode"
      (darkModeChange)="onToggleDarkMode($event)"
    ></app-toggle-dark-mode>
  </div>
</nav>
