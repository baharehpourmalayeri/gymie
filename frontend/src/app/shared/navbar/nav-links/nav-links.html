<div
  class="flex flex-col md:flex-row items-start md:items-center space-y-4 md:space-y-0 md:space-x-4"
>
  @for (link of links; track link.path) {
    <a
      [routerLink]="link.path"
      class="flex items-center justify-center text-sm px-4 py-2 w-20 h-10 rounded-full duration-200 cursor-pointer"
    >
      {{ link.label }}
    </a>
  }
</div>
